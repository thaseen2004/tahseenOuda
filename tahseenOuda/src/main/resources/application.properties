spring.application.name=tahseenOuda

# Use MySQL for local development: create database and let Hibernate create tables
spring.datasource.url=jdbc:mysql://localhost:3306/first-project
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Let Hibernate create the schema (will create tables anew)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
# Let Hibernate auto-detect the MySQL dialect from the JDBC driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# If creation fails, drop the database and recreate it (see instructions in README).
